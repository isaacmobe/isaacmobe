        <circle cx="-3" cy="-7" r="3"/> <circle cx="3" cy="-7" r="3"/>
        <circle cx="-3" cy="-1" r="3"/> <circle cx="3" cy="-1" r="3"/>
        <path d="M-3,2 C-3,5 -3,8 0,8 C3,8 3,5 3,2" />
      </g>
      <text y="20" class="text-gray font-medium font-bold" text-anchor="middle">FIGMA</text>
    </g>
