  <rect x="490" y="450" width="220" height="48" class="pill-dark" />
  <text x="600" y="480" class="text-light font-small font-bold" text-anchor="middle">VIEW_LATEST_PROJECTS ↗</text>

  <rect x="60" y="550" width="1080" height="76" class="card" />
  
  <g transform="translate(0, 588)">
    <g transform="translate(150, 0)">
