        <ellipse rx="9" ry="3.5" transform="rotate(30)"/>
        <ellipse rx="9" ry="3.5" transform="rotate(90)"/>
        <ellipse rx="9" ry="3.5" transform="rotate(150)"/>
        <circle r="2" fill="#6B7280"/>
      </g>
      <text y="20" class="text-gray font-medium font-bold" text-anchor="middle">REACT.JS</text>
    </g>

    <g transform="translate(330, 0)">
      <g transform="translate(0, -12)" class="icon-path-gray">
        <path d="M-6,7 L-6,-3 L2,-7 L8,-4 L8,4 L0,9 Z" />
        <path d="M-6,-3 L0,0 L8,-4 M0,0 L0,9" />
