  <text x="60" y="705" font-size="20" class="text-dark font-bold" letter-spacing="-0.5">SYS.SERVICES // 04</text>
  <line x1="60" y1="725" x2="1140" y2="725" stroke="#D1D5DB" stroke-width="1.5" stroke-dasharray="6 6"/>

  <rect x="60" y="760" width="240" height="280" class="card" />
  <rect x="90" y="790" width="50" height="50" class="icon-box" />
  <g transform="translate(115, 815)" class="icon-path">
