    </g>

    <g transform="translate(690, 0)">
      <g transform="translate(0, -12)" class="icon-path-gray">
        <path d="M-8,-8 L-8,2 C-8,6 -4,9 0,9 C4,9 8,6 8,2 L8,-8" />
        <path d="M-3,-8 L-3,2 C-3,4 -1,5 0,5 C1,5 3,4 3,2 L3,-8" />
      </g>
      <text y="20" class="text-gray font-medium font-bold" text-anchor="middle">UNREAL_ENGINE</text>
    </g>

    <g transform="translate(870, 0)">
      <g transform="translate(0, -12)" class="icon-path-gray">
        <circle cx="-2" cy="-2" r="5" />
        <circle cx="-2" cy="-2" r="1.5" fill="#6B7280"/>
        <path d="M3,-2 L10,-2 M-2,3 L-2,10 M-6,-6 L-10,-10" />
      </g>
      <text y="20" class="text-gray font-medium font-bold" text-anchor="middle">BLENDER</text>
    </g>

