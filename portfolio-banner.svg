  <text x="90" y="880" font-size="18" class="text-dark font-bold">BRAND &amp; UI/UX</text>
  <text x="90" y="910" font-size="14" class="text-gray">Designing interfaces</text>
  <text x="90" y="935" font-size="14" class="text-gray">that are intuitive,</text>
  <text x="90" y="960" font-size="14" class="text-gray">efficient &amp; scalable.</text>

  <rect x="340" y="760" width="240" height="280" class="card" />
  <rect x="370" y="790" width="50" height="50" class="icon-box" />
  <g transform="translate(395, 815)" class="icon-path">
    <rect x="-12" y="-10" width="24" height="20" rx="2" />
    <path d="M-8,-4 L-4,0 L-8,4" />
    <line x1="-2" y1="4" x2="6" y2="4" />
  </g>
  <text x="370" y="880" font-size="18" class="text-dark font-bold">FULL-STACK DEV</text>
  <text x="370" y="910" font-size="14" class="text-gray">Transforming ideas</text>
  <text x="370" y="935" font-size="14" class="text-gray">into web apps using</text>
  <text x="370" y="960" font-size="14" class="text-gray">React &amp; Laravel.</text>

  <rect x="620" y="760" width="240" height="280" class="card" />
  <rect x="650" y="790" width="50" height="50" class="icon-box" />
  <g transform="translate(675, 815)" class="icon-path">
    <polygon points="0,-12 10,-6 10,6 0,12 -10,6 -10,-6" />
    <line x1="-10" y1="-6" x2="0" y2="0" />
    <line x1="10" y1="-6" x2="0" y2="0" />
    <line x1="0" y1="12" x2="0" y2="0" />
  </g>
  <text x="650" y="880" font-size="18" class="text-dark font-bold">3D &amp; GAME ART</text>
  <text x="650" y="910" font-size="14" class="text-gray">Crafting visually</text>
  <text x="650" y="935" font-size="14" class="text-gray">stunning models in</text>
  <text x="650" y="960" font-size="14" class="text-gray">Blender &amp; Unreal.</text>

  <rect x="900" y="760" width="240" height="280" class="card" />
  <rect x="930" y="790" width="50" height="50" class="icon-box" />
  <g transform="translate(955, 815)" class="icon-path">
    <ellipse cx="0" cy="-6" rx="10" ry="4" />
    <path d="M-10,-6 L-10,0 C-10,2.2 0,4 0,4 C0,4 10,2.2 10,0 L10,-6" />
    <path d="M-10,0 L-10,6 C-10,8.2 0,10 0,10 C0,10 10,8.2 10,6 L10,0" />
  </g>
  <text x="930" y="880" font-size="18" class="text-dark font-bold">SYSTEM ARCH</text>
  <text x="930" y="910" font-size="14" class="text-gray">Bringing complex</text>
  <text x="930" y="935" font-size="14" class="text-gray">visions to life with</text>
  <text x="930" y="960" font-size="14" class="text-gray">secure databases.</text>

